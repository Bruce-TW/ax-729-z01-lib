<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路連線發生錯誤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #020617; color: #94a3b8; transition: background-color 0.3s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timer-card { background-color: #0f172a; border: 1px solid #1e293b; transition: all 0.2s ease; }
        .card-finished { border-color: #ef4444; background-color: #1a0a0a; }
        .modal-overlay { backdrop-filter: blur(12px); background-color: rgba(0,0,0,0.8); }
        .hidden { display: none !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div id="fake-offline-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6" style="font-family: 'Segoe UI', Tahoma, sans-serif;">
    <div class="max-w-md w-full">
        <div class="mb-10">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="#5f6368"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm8 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zM7 10c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm10 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1z"/></svg>
        </div>
        <h1 class="text-[22px] text-[#202124] mb-4 font-normal">未連線至網際網路</h1>
        <ul class="text-[#5f6368] text-sm list-disc ml-5 space-y-2 mb-10 leading-relaxed">
            <li>試著檢查網線、數據機和路由器</li>
            <li>重新連線至 Wi-Fi</li>
        </ul>
        <p onclick="showPinInput()" class="text-[#5f6368] text-[11px] mono uppercase cursor-pointer hover:text-slate-400 transition">ERR_INTERNET_DISCONNECTED</p>
    </div>
</div>

<div id="pin-modal" class="fixed inset-0 z-[101] flex items-center justify-center bg-black/95 hidden">
    <div class="text-center p-10 bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl">
        <div class="mb-6 flex justify-center"><i data-lucide="lock" class="text-emerald-500 w-8 h-8"></i></div>
        <h3 class="text-emerald-500 mono mb-4 tracking-widest text-xs font-bold">SYSTEM_CHALLENGE</h3>
        <input type="password" id="auth-pin" maxlength="4" placeholder="••••" class="bg-slate-950 border border-emerald-500/30 text-white text-5xl text-center w-48 py-4 rounded-3xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all mono">
    </div>
</div>

<div id="app-main" class="max-w-6xl mx-auto p-4 md:p-8 opacity-0 transition-opacity duration-500">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div class="flex items-center gap-6">
            <div>
                <h1 class="text-2xl font-bold text-emerald-400 flex items-center gap-2 mono">
                    <i data-lucide="ghost"></i> MUSH_SOUP
                </h1>
                <p class="text-slate-600 text-[10px] tracking-[0.2em] uppercase font-bold">Stealth Console v05.3.2</p>
            </div>
            <div class="flex bg-slate-900 border border-slate-800 rounded-xl p-1">
                <button onclick="switchView('light')" id="btn-light" class="px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all uppercase">Card</button>
                <button onclick="switchView('dark')" id="btn-dark" class="px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all uppercase">Console</button>
            </div>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <button onclick="manualLock()" class="p-4 text-slate-500 bg-slate-900 rounded-2xl hover:text-white transition shadow-lg" title="隱身">
                <i data-lucide="wifi-off" class="w-6 h-6"></i>
            </button>
            <button onclick="toggleSettings(true)" class="p-4 text-slate-500 bg-slate-900 rounded-2xl hover:text-emerald-500 transition shadow-lg"><i data-lucide="settings" class="w-6 h-6"></i></button>
            <button onclick="addNewTimer()" class="flex-1 md:flex-none bg-emerald-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-emerald-500 transition active:scale-95">新增地點</button>
        </div>
    </header>

    <div id="view-light" class="space-y-8">
        <div id="tag-container" class="flex flex-wrap gap-2 items-center"></div>
        <div id="timer-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="view-dark" class="hidden space-y-6">
        <div class="bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse mono text-xs">
                <thead class="bg-slate-900/80 text-slate-500 uppercase tracking-widest">
                    <tr><th class="p-5">Location</th><th class="p-5">Status</th><th class="p-5">T-Minus</th><th class="p-5 text-right">Cmd</th></tr>
                </thead>
                <tbody id="dark-table-body" class="divide-y divide-slate-900 text-slate-300"></tbody>
            </table>
        </div>
        <div id="log-box" class="bg-black p-5 border border-slate-800 rounded-2xl text-[10px] mono text-emerald-500/50 h-40 overflow-y-auto leading-relaxed shadow-inner">
            <p>> [SYSTEM] SECURITY_ENABLED.</p>
        </div>
    </div>
</div>

<div id="settings-modal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 modal-overlay">
    <div class="bg-slate-900 rounded-[2.5rem] w-full max-w-md p-10 border border-slate-800 shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-8 flex items-center gap-3"><i data-lucide="shield-lock" class="text-emerald-500"></i> CONFIG</h2>
        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-slate-500 uppercase mb-2 block tracking-widest">Bot Token</label>
                <input type="password" id="cfg-token" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-white mono outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="text-[10px] text-slate-500 uppercase mb-2 block tracking-widest">Chat ID</label>
                <input type="password" id="cfg-chatid" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-white mono outline-none focus:border-emerald-500">
            </div>
            <div class="flex gap-4 pt-4">
                <button onclick="updatePin()" class="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">修改 PIN</button>
                <button onclick="destroyAllData()" class="flex-1 py-3 bg-red-900/20 text-red-500 rounded-xl text-xs font-bold border border-red-900/50">銷毀資料</button>
            </div>
        </div>
        <div class="mt-10 flex gap-4"><button onclick="toggleSettings(false)" class="flex-1 py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold">CLOSE</button><button onclick="saveConfig()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold">SAVE</button></div>
    </div>
</div>

<div id="exec-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 modal-overlay">
    <div class="bg-slate-900 border border-slate-700 rounded-[2.5rem] w-full max-w-xs p-10 shadow-2xl text-center">
        <h3 class="text-white font-bold mb-6 flex justify-center gap-2 items-center"><i data-lucide="play-circle" class="text-emerald-500"></i> <span id="modal-target-name"></span></h3>
        <div class="flex gap-3 mb-8">
            <input type="number" id="m-h" placeholder="H" class="w-full bg-slate-950 border border-slate-800 text-white text-center text-xl py-4 rounded-2xl focus:border-emerald-500 outline-none mono">
            <input type="number" id="m-m" placeholder="M" class="w-full bg-slate-950 border border-slate-800 text-white text-center text-xl py-4 rounded-2xl focus:border-emerald-500 outline-none mono">
            <input type="number" id="m-s" placeholder="S" class="w-full bg-slate-950 border border-slate-800 text-white text-center text-xl py-4 rounded-2xl focus:border-emerald-500 outline-none mono">
        </div>
        <div class="flex gap-4"><button onclick="closeExecModal()" class="flex-1 py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold">CANCEL</button><button onclick="confirmExec()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold">START</button></div>
    </div>
</div>

<script>
    let timers = JSON.parse(localStorage.getItem('pikmin-pro-v1')) || [];
    let savedLocations = JSON.parse(localStorage.getItem('pikmin-locations')) || ["活動中心", "大溜滑梯", "土地公"];
    let config = JSON.parse(localStorage.getItem('tg-config')) || { token: '', chatId: '' };
    let masterPin = localStorage.getItem('app-pin') || "1234";
    let currentView = localStorage.getItem('app-view') || 'light';
    let lastMessageId = localStorage.getItem('tg-last-msg-id') || null;
    let activeModalId = null;

    function save() { 
        localStorage.setItem('pikmin-pro-v1', JSON.stringify(timers)); 
        localStorage.setItem('pikmin-locations', JSON.stringify(savedLocations)); 
    }

    // --- 安全與隱身 ---
    function showPinInput() { 
        document.getElementById('pin-modal').classList.remove('hidden'); 
        document.getElementById('auth-pin').focus(); 
    }

    document.getElementById('auth-pin').addEventListener('input', (e) => {
        if(e.target.value === masterPin) {
            document.getElementById('fake-offline-screen').classList.add('hidden');
            document.getElementById('pin-modal').classList.add('hidden');
            document.getElementById('app-main').style.opacity = '1';
            addLog("AUTH: ACCESS_GRANTED");
            e.target.value = '';
        }
    });

    function manualLock() {
        document.getElementById('app-main').style.opacity = '0';
        document.getElementById('fake-offline-screen').classList.remove('hidden');
    }

    function addLog(msg) {
        const box = document.getElementById('log-box');
        const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
        const p = document.createElement('p');
        p.innerText = `> [${time}] ${msg}`;
        box.prepend(p);
        if (box.childNodes.length > 30) box.lastChild.remove();
    }

    // --- TG 新訊息看板 ---
    async function updateDashboard(isEdit = false) {
        if (!config.token || !config.chatId) return;

        const active = timers.filter(t => t.isRunning).sort((a,b) => a.endTime - b.endTime);
        let text = "🍄 *蘑菇重生預報*\n----------------\n";
        
        if (active.length === 0) {
            text += "目前沒有追蹤中的蘑菇。";
        } else {
            active.forEach((t, i) => {
                const rem = t.endTime - Date.now();
                const timeStr = new Date(t.endTime).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
                text += `${i+1}. *${t.name}* : ${(rem <= 0) ? "✅ 已重生" : "⏳ " + timeStr}\n`;
            });
        }

        const method = (isEdit && lastMessageId) ? 'editMessageText' : 'sendMessage';
        const body = { chat_id: config.chatId, text: text, parse_mode: "Markdown" };
        if (isEdit && lastMessageId) body.message_id = lastMessageId;

        try {
            const res = await fetch(`https://api.telegram.org/bot${config.token}/${method}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.ok && !isEdit) {
                lastMessageId = data.result.message_id;
                localStorage.setItem('tg-last-msg-id', lastMessageId);
            }
            addLog(`TG_PUSH: ${method.toUpperCase()}`);
        } catch (e) {
            addLog("TG_PUSH: ERROR");
        }
    }

    async function sendAlert(msg) {
        if (!config.token) return;
        await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: config.chatId, text: msg })
        });
    }

    function startTimer(id) {
        const t = timers.find(x => x.id === id);
        const h = parseInt(t.inputs.h) || 0, m = parseInt(t.inputs.m) || 0, s = parseInt(t.inputs.s) || 0;
        t.endTime = Date.now() + (h * 3600 + m * 60 + s) * 1000 + (5 * 60 * 1000);
        t.isRunning = true; 
        t.notified = false; t.notified60s = false; t.notified10s = false;
        save(); render(); updateDashboard(false);
        addLog(`TIMER: [${t.name}] ACTIVATED`);
    }

    function resetTimer(id) {
        const t = timers.find(x => x.id === id);
        t.isRunning = false; t.endTime = null;
        save(); render(); addLog(`TIMER: [${t.name}] RESET`);
    }

    // --- 每秒核心循環 ---
    setInterval(() => {
        let needsDashboardUpdate = false;
        let changed = false;

        timers.forEach(t => {
            if (t.isRunning && t.endTime) {
                const rem = t.endTime - Date.now();

                // 1. 一分鐘前預警 (60s)
                if (rem <= 60000 && rem > 58000 && !t.notified60s) {
                    sendAlert(`⚠️ 預警：【${t.name}】預計 1 分鐘後重生`);
                    t.notified60s = true; changed = true;
                }

                // 2. 十秒前預警 (10s)
                if (rem <= 10000 && rem > 8000 && !t.notified10s) {
                    sendAlert(`🚨 倒數：【${t.name}】即將在 10 秒內重生！`);
                    t.notified10s = true; changed = true;
                }

                // 3. 正式重生 (0s)
                if (rem <= 0 && !t.notified) {
                    t.notified = true;
                    needsDashboardUpdate = true;
                    sendAlert(`✅ 提醒：【${t.name}】重生時間到！Go Mush!`);
                    changed = true;
                }

                // 清除過期計時器 (30分鐘後)
                if (rem < -1800000) {
                    t.isRunning = false; t.endTime = null; changed = true;
                }
            }
        });

        if (needsDashboardUpdate) updateDashboard(true);
        if (changed) save();
        if (timers.some(t => t.isRunning)) render();
    }, 1000);

    function switchView(v) {
        currentView = v; localStorage.setItem('app-view', v);
        const vL = document.getElementById('view-light'), vD = document.getElementById('view-dark');
        const bL = document.getElementById('btn-light'), bD = document.getElementById('btn-dark');
        if(v === 'dark') {
            vL.classList.add('hidden'); vD.classList.remove('hidden');
            bD.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-600 text-white shadow-lg';
            bL.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-500';
        } else {
            vD.classList.add('hidden'); vL.classList.remove('hidden');
            bL.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold bg-slate-700 text-white shadow-lg';
            bD.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-500';
        }
        render();
    }

    function render() {
        if (currentView === 'light') renderLight(); else renderDark();
        lucide.createIcons();
    }

    function renderLight() {
        const tagBox = document.getElementById('tag-container');
        tagBox.innerHTML = savedLocations.map(loc => `<button onclick="addNewTimer('${loc}')" class="bg-slate-900 border border-slate-800 text-slate-400 px-3 py-1 rounded-full hover:border-emerald-500 transition">${loc}</button>`).join('');
        const container = document.getElementById('timer-container');
        container.innerHTML = timers.map(t => {
            const rem = t.isRunning ? Math.max(0, t.endTime - Date.now()) : 0;
            const isFin = t.isRunning && rem <= 0;
            return `
                <div class="timer-card rounded-[2.5rem] p-8 ${isFin ? 'card-finished' : ''}">
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-bold text-slate-200 text-lg">${t.name}</span>
                        <button onclick="removeTimer(${t.id})" class="text-slate-700 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    ${!t.isRunning ? `
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            <input type="number" oninput="timers.find(x=>x.id===${t.id}).inputs.h=this.value" placeholder="H" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none mono border border-slate-900 focus:border-emerald-500">
                            <input type="number" oninput="timers.find(x=>x.id===${t.id}).inputs.m=this.value" placeholder="M" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none mono border border-slate-900 focus:border-emerald-500">
                            <input type="number" oninput="timers.find(x=>x.id===${t.id}).inputs.s=this.value" placeholder="S" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none mono border border-slate-900 focus:border-emerald-500">
                        </div>
                        <button onclick="startTimer(${t.id})" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">START</button>
                    ` : `
                        <div class="text-center py-2">
                            <div class="text-5xl font-mono font-bold tracking-tighter ${isFin ? 'text-red-500' : 'text-emerald-400'}">${formatTime(rem)}</div>
                            <button onclick="resetTimer(${t.id})" class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest hover:text-white transition underline underline-offset-4">Reset Timer</button>
                        </div>
                    `}
                </div>`;
        }).join('');
    }

    function renderDark() {
        document.getElementById('dark-table-body').innerHTML = timers.map(t => {
            const rem = t.isRunning ? Math.max(0, t.endTime - Date.now()) : 0;
            const status = !t.isRunning ? '<span class="text-slate-700">READY</span>' : (rem > 0 ? '<span class="text-emerald-500">RUNNING</span>' : '<span class="text-amber-500">YIELDED</span>');
            return `
                <tr>
                    <td class="p-5 font-bold text-slate-300">${t.name}</td>
                    <td class="p-5">${status}</td>
                    <td class="p-5 font-mono text-slate-500">${formatTime(rem)}</td>
                    <td class="p-5 text-right">
                        ${!t.isRunning ? `<button onclick="openExecModal(${t.id})" class="text-emerald-500 border border-emerald-500/20 px-3 py-1 rounded-lg">EXEC</button>` 
                        : `<button onclick="resetTimer(${t.id})" class="text-slate-700 hover:text-red-400 transition">STOP</button>`}
                    </td>
                </tr>`;
        }).join('');
    }

    function formatTime(ms) { const s = Math.floor((ms/1000)%60), m = Math.floor((ms/(1000*60))%60), h = Math.floor(ms/(1000*60*60)); return [h,m,s].map(v=>v.toString().padStart(2,'0')).join(':'); }
    function openExecModal(id) { activeModalId = id; document.getElementById('modal-target-name').innerText = timers.find(x=>x.id===id).name; document.getElementById('exec-modal').classList.remove('hidden'); }
    function closeExecModal() { document.getElementById('exec-modal').classList.add('hidden'); }
    function confirmExec() { 
        const t = timers.find(x=>x.id===activeModalId);
        t.inputs = { h: document.getElementById('m-h').value, m: document.getElementById('m-m').value, s: document.getElementById('m-s').value };
        startTimer(activeModalId); closeExecModal(); 
    }
    function addNewTimer(name = "新地點") { 
        timers.push({id:Date.now(), name, isRunning:false, inputs:{h:'',m:'',s:''}, notified60s:false, notified10s:false, notified:false}); 
        save(); render(); updateDashboard(false);
    }
    function removeTimer(id) { timers = timers.filter(x=>x.id!==id); save(); render(); updateDashboard(false); }
    function toggleSettings(s) { if(s){document.getElementById('cfg-token').value=config.token; document.getElementById('cfg-chatid').value=config.chatId;} document.getElementById('settings-modal').classList.toggle('hidden', !s); }
    function saveConfig() { config.token = document.getElementById('cfg-token').value; config.chatId = document.getElementById('cfg-chatid').value; localStorage.setItem('tg-config', JSON.stringify(config)); toggleSettings(false); addLog("CONFIG: UPDATED"); }
    function updatePin() { const p = prompt("新 PIN："); if(p && p.length===4){masterPin=p; localStorage.setItem('app-pin',p); alert("PIN 已更新");} }
    function destroyAllData() { if(confirm("抹除所有設定？")){localStorage.clear(); location.reload();} }

    window.onload = () => { 
        lucide.createIcons();
        if(timers.length > 0 || config.token) manualLock(); 
        else { document.getElementById('fake-offline-screen').classList.add('hidden'); document.getElementById('app-main').style.opacity = '1'; }
    };
</script>
</body>
</html>
