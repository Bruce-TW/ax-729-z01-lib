<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路連線發生錯誤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #020617; color: #94a3b8; transition: background-color 0.3s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timer-card { background-color: #0f172a; border: 1px solid #1e293b; transition: all 0.2s ease; }
        .card-finished { border-color: #ef4444; background-color: #1a0a0a; }
        .hidden { display: none !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        summary::-webkit-details-marker { display: none; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="fake-offline-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="mb-10"><svg width="72" height="72" viewBox="0 0 24 24" fill="#5f6368"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm8 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zM7 10c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm10 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1z"/></svg></div>
        <h1 class="text-[22px] text-[#202124] mb-4 font-normal">未連線至網際網路</h1>
        <ul class="text-[#5f6368] text-sm list-disc ml-5 space-y-2 mb-10 leading-relaxed">
            <li>試著檢查網線、數據機和路由器</li>
            <li>重新連線至 Wi-Fi</li>
        </ul>
        <p onclick="showPinInput()" class="text-[#5f6368] text-[11px] mono uppercase cursor-pointer">ERR_INTERNET_DISCONNECTED</p>
    </div>
</div>

<div id="pin-modal" class="fixed inset-0 z-[101] flex items-center justify-center bg-black/95 hidden">
    <div class="text-center p-10 bg-slate-900 border border-slate-800 rounded-[2.5rem]">
        <input type="password" id="auth-pin" maxlength="4" placeholder="••••" class="bg-slate-950 border border-emerald-500/30 text-white text-5xl text-center w-48 py-4 rounded-3xl outline-none mono">
    </div>
</div>

<div id="app-main" class="max-w-6xl mx-auto p-4 md:p-8 opacity-0 transition-opacity duration-500">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div class="flex items-center gap-6">
            <div>
                <h1 class="text-2xl font-bold text-emerald-400 flex items-center gap-2 mono"><i data-lucide="ghost"></i> MUSH_SOUP</h1>
                <div class="flex items-center gap-2 mt-1">
                    <p id="version-text" class="text-slate-600 text-[10px] tracking-[0.2em] uppercase font-bold">Stealth Console v05.6.1</p>
                    <i onclick="toggleAdmin()" id="admin-icon" data-lucide="shield-check" class="w-3 h-3 text-slate-800 cursor-pointer"></i>
                </div>
            </div>
            <div class="flex bg-slate-900/50 border border-slate-800 rounded-xl p-1">
                <button onclick="switchView('light')" id="btn-light" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all">Card</button>
                <button onclick="switchView('dark')" id="btn-dark" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all">Console</button>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="manualLock()" class="p-4 text-slate-500 bg-slate-900 rounded-2xl hover:text-white transition shadow-lg"><i data-lucide="wifi-off" class="w-6 h-6"></i></button>
            <button onclick="toggleSettings(true)" class="p-4 text-slate-500 bg-slate-900 rounded-2xl hover:text-emerald-500 transition shadow-lg"><i data-lucide="settings" class="w-6 h-6"></i></button>
        </div>
    </header>

    <div id="location-manager" class="mb-8 bg-slate-950/50 rounded-2xl border border-slate-900 p-2">
        <details class="group">
            <summary class="flex items-center justify-between px-4 py-2 cursor-pointer text-[10px] text-slate-600 hover:text-emerald-500 mono transition">
                <span>> [SYSTEM_LOCATION_MGNT]</span>
                <i data-lucide="chevron-down" class="w-3 h-3 group-open:rotate-180 transition"></i>
            </summary>
            <div class="p-4 flex flex-col md:flex-row gap-3 border-t border-slate-900 mt-2">
                <input type="text" id="new-loc-name" placeholder="地點名稱" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-emerald-400 outline-none mono">
                <div class="flex gap-2 md:w-80">
                    <input type="text" id="new-loc-group" placeholder="群組名稱" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-slate-400 outline-none mono">
                    <select id="group-select" onchange="document.getElementById('new-loc-group').value = this.value === 'NEW' ? '' : this.value" class="bg-slate-900 border border-slate-800 rounded-xl px-2 text-[10px] text-slate-500 outline-none mono"></select>
                </div>
                <button onclick="confirmAddLocation()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl text-xs font-bold hover:bg-emerald-500 transition mono uppercase">Add_Node</button>
            </div>
        </details>
    </div>

    <div id="tag-container" class="space-y-2 mb-8"></div>
    <div id="view-light" class="space-y-8"><div id="timer-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
    <div id="view-dark" class="hidden space-y-6">
        <details open class="group bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden">
            <summary class="p-4 bg-slate-900/50 cursor-pointer flex justify-between items-center text-[10px] mono text-slate-500 uppercase tracking-widest hover:text-emerald-500 transition">
                <span>> [ACTIVE_PROCESSES]</span>
                <i data-lucide="chevron-down" class="w-4 h-4 group-open:rotate-180 transition"></i>
            </summary>
            <table class="w-full text-left border-collapse mono text-xs">
                <thead class="bg-slate-900/80 text-slate-600 uppercase tracking-widest">
                    <tr><th class="p-5">Location</th><th class="p-5">Status</th><th class="p-5">T-Minus</th><th class="p-5 text-right">Cmd</th></tr>
                </thead>
                <tbody id="dark-table-body" class="divide-y divide-slate-900 text-slate-300"></tbody>
            </table>
        </details>
        <div id="log-box" class="bg-black p-5 border border-slate-800 rounded-2xl text-[10px] mono text-emerald-500/50 h-40 overflow-y-auto leading-relaxed shadow-inner"><p>> [SYSTEM] SECURITY_ENABLED.</p></div>
    </div>
</div>

<div id="settings-modal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 modal-overlay">
    <div class="bg-slate-900 rounded-[2.5rem] w-full max-w-md p-10 border border-slate-800 shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-bold text-white mb-8 flex items-center gap-3"><i data-lucide="shield-lock" class="text-emerald-500"></i> CONFIG</h2>
        
        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-slate-500 uppercase mb-2 block tracking-widest">Bot Token</label>
                <input type="password" id="cfg-token" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-white mono outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="text-[10px] text-slate-500 uppercase mb-2 block tracking-widest">Chat ID</label>
                <input type="password" id="cfg-chatid" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-5 py-4 text-white mono outline-none focus:border-emerald-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-3 p-3 bg-slate-950/50 border border-slate-800 rounded-xl cursor-pointer hover:border-emerald-500/50 transition">
                    <input type="checkbox" id="cfg-offset" class="w-4 h-4 accent-emerald-500">
                    <span class="text-[10px] text-slate-400 mono uppercase">5m Offset</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-slate-950/50 border border-slate-800 rounded-xl cursor-pointer hover:border-emerald-500/50 transition">
                    <input type="checkbox" id="cfg-admin-alert" class="w-4 h-4 accent-emerald-500">
                    <span class="text-[10px] text-slate-400 mono uppercase">Admin Alert</span>
                </label>
            </div>

            <div class="pt-2">
                <label class="text-[10px] text-slate-500 uppercase mb-3 block tracking-widest text-center">Data Backup (Location Groups)</label>
                <div class="flex gap-4">
                    <button onclick="exportLocations()" class="flex-1 py-3 bg-slate-800 text-emerald-400 rounded-xl text-[10px] font-bold mono border border-emerald-900/30 hover:bg-emerald-950/20 transition flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-3 h-3"></i> EXPORT
                    </button>
                    <label class="flex-1 py-3 bg-slate-800 text-blue-400 rounded-xl text-[10px] font-bold mono border border-blue-900/30 hover:bg-blue-950/20 transition flex items-center justify-center gap-2 cursor-pointer">
                        <i data-lucide="upload" class="w-3 h-3"></i> IMPORT
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importLocations(this)">
                    </label>
                </div>
            </div>

            <div class="flex gap-4 pt-4 border-t border-slate-800/50">
                <button onclick="updatePin()" class="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">修改 PIN</button>
                <button onclick="destroyAllData()" class="flex-1 py-3 bg-red-900/20 text-red-500 rounded-xl text-xs font-bold border border-red-900/50">銷毀資料</button>
            </div>
        </div>
        
        <div class="mt-10 flex gap-4">
            <button onclick="toggleSettings(false)" class="flex-1 py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold">CLOSE</button>
            <button onclick="saveConfig()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold">SAVE</button>
        </div>
    </div>
</div>

<div id="edit-tag-modal" class="fixed inset-0 z-[130] hidden flex items-center justify-center p-4 modal-overlay">
    <div class="bg-slate-900 rounded-[2.5rem] w-full max-w-sm p-8 border border-slate-800 shadow-2xl">
        <h3 class="text-white font-bold mb-6 flex items-center gap-2"><i data-lucide="edit-3" class="text-emerald-500"></i> EDIT_TAG</h3>
        <div class="space-y-4">
            <input type="text" id="edit-loc-name" placeholder="名稱" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white outline-none focus:border-emerald-500">
            <div class="flex gap-2">
                <input type="text" id="edit-loc-group" placeholder="群組" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white outline-none focus:border-emerald-500">
                <select id="edit-group-select" onchange="document.getElementById('edit-loc-group').value = this.value" class="bg-slate-800 border-none rounded-xl text-xs text-slate-400 outline-none px-2"></select>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeEditTag()" class="flex-1 py-3 bg-slate-800 text-slate-400 rounded-xl font-bold">CANCEL</button>
                <button onclick="confirmEditTag()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>
</div>

<script>
    let timers = JSON.parse(localStorage.getItem('pikmin-pro-v1')) || [];
    let savedLocations = JSON.parse(localStorage.getItem('pikmin-locations')) || [{name: "活動中心", group: "預設"}, {name: "大溜滑梯", group: "預設"}, {name: "土地公", group: "預設"}];
    let config = JSON.parse(localStorage.getItem('tg-config')) || { token: '', chatId: '', useOffset: true, adminAlert: false };
    let masterPin = localStorage.getItem('app-pin') || "1234";
    let currentView = localStorage.getItem('app-view') || 'light';
    let lastMessageId = localStorage.getItem('tg-last-msg-id') || null;
    let isAdmin = false;
    let groupStates = {};
    let editingTagIdx = null;

    function save() { 
        localStorage.setItem('pikmin-pro-v1', JSON.stringify(timers)); 
        localStorage.setItem('pikmin-locations', JSON.stringify(savedLocations)); 
    }

    function toggleAdmin() {
        isAdmin = !isAdmin;
        document.getElementById('version-text').className = (isAdmin ? 'text-red-500' : 'text-slate-600') + " text-[10px] tracking-[0.2em] uppercase font-bold transition-colors";
        document.getElementById('admin-icon').className = `w-3 h-3 ${isAdmin ? 'text-red-500' : 'text-slate-800'} cursor-pointer hover:text-slate-500 transition shadow-sm`;
        render();
    }

    function exportLocations() {
        const dataStr = JSON.stringify(savedLocations, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `EC_report_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        addLog("DATA: EXPORT_SUCCESS");
    }

    function importLocations(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if (confirm(`載入 ${imported.length} 個地點？這會覆蓋目前的列表。`)) {
                        savedLocations = imported;
                        save(); render();
                        addLog("DATA: IMPORT_SUCCESS");
                        alert("匯入成功！");
                    }
                } else { alert("無效的檔案格式。"); }
            } catch (err) { alert("讀取檔案失敗。"); }
        };
        reader.readAsText(file);
        input.value = '';
    }

    function startTimer(id) {
        const t = timers.find(x => x.id === id);
        const h = parseInt(t.inputs.h) || 0, m = parseInt(t.inputs.m) || 0, s = parseInt(t.inputs.s) || 0;
        const offsetMs = config.useOffset ? (5 * 60 * 1000) : 0;
        t.endTime = Date.now() + (h * 3600 + m * 60 + s) * 1000 + offsetMs;
        t.isRunning = true; t.notified = false; t.notified60s = false; t.notified10s = false;
        save(); render(); updateDashboard(false);
    }

    // 修正：EXEC 按鈕設定時間
    function setTimerWithPrompt(id) {
        const t = timers.find(x => x.id === id);
        const h = prompt(`[${t.name}] 小時 (H):`, t.inputs.h || "0"); if(h === null) return;
        const m = prompt(`[${t.name}] 分鐘 (M):`, t.inputs.m || "0"); if(m === null) return;
        const s = prompt(`[${t.name}] 秒數 (S):`, t.inputs.s || "0"); if(s === null) return;
        t.inputs = { h: h || "0", m: m || "0", s: s || "0" };
        save();
        startTimer(id);
    }

    async function sendAlert(msg) { 
        if (!isAdmin || config.adminAlert) {
            if (!config.token || !config.chatId) {
                if(isAdmin) addLog(`[ERROR] TG_CONFIG_MISSING`);
                return; 
            }
            try {
                await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ chat_id: config.chatId, text: msg }) 
                });
            } catch(e) { if(isAdmin) addLog(`[ERROR] TG_FETCH_FAILED`); }
        } 
        if(isAdmin) addLog(`[MSG] ${msg}`); 
    }

    function showPinInput() { document.getElementById('pin-modal').classList.remove('hidden'); document.getElementById('auth-pin').focus(); }
    document.getElementById('auth-pin').addEventListener('input', (e) => { if(e.target.value === masterPin) { document.getElementById('fake-offline-screen').classList.add('hidden'); document.getElementById('pin-modal').classList.add('hidden'); document.getElementById('app-main').style.opacity = '1'; e.target.value = ''; } });

    function confirmAddLocation() {
        const nameInput = document.getElementById('new-loc-name');
        const groupInput = document.getElementById('new-loc-group');
        if(!nameInput.value.trim()) return;
        savedLocations.push({name: nameInput.value.trim(), group: groupInput.value.trim() || "預設"});
        save(); render();
        nameInput.value = ''; groupInput.value = '';
    }

    function resetTimer(id) { const t = timers.find(x => x.id === id); t.isRunning = false; t.endTime = null; save(); render(); updateDashboard(true); }

    setInterval(() => {
        let needsUpdate = false;
        timers.forEach(t => { 
            if (t.isRunning && t.endTime) { 
                const rem = t.endTime - Date.now(); 
                if (rem <= 60000 && rem > 58000 && !t.notified60s) { sendAlert(`⚠️ 預警：【${t.name}】1 分鐘後重生`); t.notified60s = true; } 
                if (rem <= 15000 && rem > 13000 && !t.notified10s) { sendAlert(`🚨 倒數：【${t.name}】10 秒內重生`); t.notified10s = true; }
                if (rem <= 6000 && !t.notified) { t.notified = true; needsUpdate = true; sendAlert(`✅ 提醒：【${t.name}】time is up`); }
            } 
        });
        if (needsUpdate) updateDashboard(true);
        const activeEl = document.activeElement;
        const isTyping = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'SELECT');
        if (!isTyping) render();
    }, 1000);

    function toggleSettings(s) { 
        if(s){
            document.getElementById('cfg-token').value = config.token; 
            document.getElementById('cfg-chatid').value = config.chatId;
            document.getElementById('cfg-offset').checked = config.useOffset !== false;
            document.getElementById('cfg-admin-alert').checked = !!config.adminAlert;
        } 
        document.getElementById('settings-modal').classList.toggle('hidden', !s); 
    }

    function saveConfig() { 
        config.token = document.getElementById('cfg-token').value; 
        config.chatId = document.getElementById('cfg-chatid').value; 
        config.useOffset = document.getElementById('cfg-offset').checked;
        config.adminAlert = document.getElementById('cfg-admin-alert').checked;
        localStorage.setItem('tg-config', JSON.stringify(config)); 
        toggleSettings(false); 
        addLog("CONFIG: SAVED"); 
    }

    function render() {
        document.getElementById('view-light').classList.toggle('hidden', currentView !== 'light');
        document.getElementById('view-dark').classList.toggle('hidden', currentView !== 'dark');
        const btnL = document.getElementById('btn-light');
        const btnD = document.getElementById('btn-dark');
        if(currentView === 'light') {
            btnL.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-600 text-white shadow-lg uppercase transition-all';
            btnD.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-500 uppercase hover:text-white transition-all';
        } else {
            btnD.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-600 text-white shadow-lg uppercase transition-all';
            btnL.className = 'px-4 py-1.5 rounded-lg text-[10px] font-bold text-slate-500 uppercase hover:text-white transition-all';
        }

        const groups = [...new Set(savedLocations.map(l => l.group))];
        const groupSelect = document.getElementById('group-select');
        groupSelect.innerHTML = `<option value="NEW">-- 快速選取 --</option>` + groups.map(g => `<option value="${g}">${g}</option>`).join('');

        const groupHoverStyle = isAdmin ? 'border border-transparent hover:bg-slate-900/20 hover:border-slate-800 rounded-2xl p-1 mb-2 transition-all duration-200' : 'border border-transparent';

        // 修正：管理員模式標籤互動
        document.getElementById('tag-container').innerHTML = groups.map(g => {
            const isOpen = groupStates[g] !== undefined ? groupStates[g] : false;
            return `<details ontoggle="updateGroupState('${g}', this.open)" ${isOpen ? 'open' : ''} class="group ${groupHoverStyle}"><summary class="flex items-center justify-between cursor-pointer py-1 text-slate-500 hover:text-slate-300"><div class="flex items-center gap-2"><i data-lucide="folder" class="w-3 h-3 text-emerald-900 group-open:text-emerald-500"></i><span class="text-[10px] font-bold mono uppercase tracking-widest">${g}</span></div><div class="flex items-center gap-1">${isAdmin ? `<button onclick="editGroupName(event, '${g}')" class="text-slate-600 hover:text-emerald-500 transition px-1"><i data-lucide="edit-2" class="w-3 h-3"></i></button><button onclick="deleteGroup(event, '${g}')" class="text-red-900/50 hover:text-red-500 transition px-1"><i data-lucide="trash-2" class="w-3 h-3"></i></button>` : ''}</div></summary><div class="pl-5 flex flex-wrap gap-2 py-2">${savedLocations.map((l, idx) => l.group === g ? `<div class="flex items-center gap-1 bg-slate-900 border border-slate-800 rounded-lg px-2 group/item hover:border-emerald-500 transition"><button onclick="addNewTimer('${l.name}')" class="text-slate-400 py-1 text-[11px] flex items-center gap-1">${l.name}</button>${isAdmin ? `<button onclick="event.stopPropagation(); openEditTag(${idx})" class="text-slate-600 hover:text-emerald-400 transition px-1 border-l border-slate-800 ml-1"><i data-lucide="pencil" class="w-2.5 h-2.5"></i></button><button onclick="deleteLocation(event, ${idx})" class="text-slate-600 hover:text-red-500 transition px-1"><i data-lucide="x" class="w-3 h-3"></i></button>` : ''}</div>` : '').join('')}</div></details>`;
        }).join('');

        document.getElementById('timer-container').innerHTML = timers.map(t => {
            const rem = t.isRunning ? Math.max(0, t.endTime - Date.now()) : 0;
            const isFin = t.isRunning && rem <= 0;
            return `<div class="timer-card rounded-[2.5rem] p-8 ${isFin ? 'card-finished' : ''}"><div class="flex justify-between items-center mb-6"><span class="font-bold text-slate-200 text-lg">${t.name}</span><button onclick="removeTimer(${t.id})" class="text-slate-700 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>${!t.isRunning ? `<div class="grid grid-cols-3 gap-2 mb-4"><input type="number" onkeypress="if(event.key==='Enter')startTimer(${t.id})" oninput="timers.find(x=>x.id===${t.id}).inputs.h=this.value" placeholder="H" value="${t.inputs.h}" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none border border-slate-900 focus:border-emerald-500"><input type="number" onkeypress="if(event.key==='Enter')startTimer(${t.id})" oninput="timers.find(x=>x.id===${t.id}).inputs.m=this.value" placeholder="M" value="${t.inputs.m}" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none border border-slate-900 focus:border-emerald-500"><input type="number" onkeypress="if(event.key==='Enter')startTimer(${t.id})" oninput="timers.find(x=>x.id===${t.id}).inputs.s=this.value" placeholder="S" value="${t.inputs.s}" class="bg-slate-950 text-white text-center py-3 rounded-xl outline-none border border-slate-900 focus:border-emerald-500"></div><button onclick="startTimer(${t.id})" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold">START</button>` : `<div class="text-center py-2"><div class="text-5xl font-mono font-bold tracking-tighter ${isFin ? 'text-red-500' : 'text-emerald-400'}">${formatTime(rem)}</div><button onclick="resetTimer(${t.id})" class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest hover:text-white transition underline">Reset Timer</button></div>`}</div>`;
        }).join('');

        document.getElementById('dark-table-body').innerHTML = timers.map(t => { const rem = t.isRunning ? Math.max(0, t.endTime - Date.now()) : 0; return `<tr><td class="p-5 font-bold text-slate-300">${t.name}</td><td class="p-5">${!t.isRunning ? 'READY' : (rem > 0 ? 'RUNNING' : 'YIELDED')}</td><td class="p-5 font-mono text-slate-500">${formatTime(rem)}</td><td class="p-5 text-right space-x-2">${!t.isRunning ? `<button onclick="setTimerWithPrompt(${t.id})" class="text-emerald-500 border border-emerald-500/20 px-3 py-1 rounded-lg">EXEC</button>` : `<button onclick="resetTimer(${t.id})" class="text-slate-700 hover:text-red-400 transition">STOP</button>`}<button onclick="removeTimer(${t.id})" class="text-red-900/50 hover:text-red-500 px-2 transition">DEL</button></td></tr>`; }).join('');
        lucide.createIcons();
    }

    function formatTime(ms) { const s = Math.floor((ms/1000)%60), m = Math.floor((ms/(1000*60))%60), h = Math.floor(ms/(1000*60*60)); return [h,m,s].map(v=>v.toString().padStart(2,'0')).join(':'); }
    function addNewTimer(name = "新地點") { timers.push({id:Date.now(), name, isRunning:false, inputs:{h:'',m:'',s:''}, notified60s:false, notified10s:false, notified:false}); save(); render(); }
    function removeTimer(id) { timers = timers.filter(x=>x.id!==id); save(); render(); updateDashboard(true); }
    function addLog(msg) { const box = document.getElementById('log-box'); const time = new Date().toLocaleTimeString('en-GB', { hour12: false }); const p = document.createElement('p'); p.innerText = `> [${time}] ${msg}`; box.prepend(p); if (box.childNodes.length > 30) box.lastChild.remove(); }
    function manualLock() { document.getElementById('app-main').style.opacity = '0'; document.getElementById('fake-offline-screen').classList.remove('hidden'); }
    function updatePin() { const p = prompt("新 PIN："); if(p && p.length===4){masterPin=p; localStorage.setItem('app-pin',p); alert("PIN 已更新");} }
    function destroyAllData() { if(confirm("抹除所有設定？")){localStorage.clear(); location.reload();} }
    function updateGroupState(group, isOpen) { groupStates[group] = isOpen; }
    function switchView(v) { currentView = v; localStorage.setItem('app-view', v); render(); }
    function handleTagClick(locName, idx) { if(isAdmin) openEditTag(idx); else addNewTimer(locName); }
    function openEditTag(idx) { editingTagIdx = idx; const loc = savedLocations[idx]; const groups = [...new Set(savedLocations.map(l => l.group))]; document.getElementById('edit-loc-name').value = loc.name; document.getElementById('edit-loc-group').value = loc.group; const sel = document.getElementById('edit-group-select'); sel.innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join(''); document.getElementById('edit-tag-modal').classList.remove('hidden'); }
    function closeEditTag() { document.getElementById('edit-tag-modal').classList.add('hidden'); }
    function confirmEditTag() { const n = document.getElementById('edit-loc-name').value.trim(); const g = document.getElementById('edit-loc-group').value.trim(); if(n) { savedLocations[editingTagIdx].name = n; savedLocations[editingTagIdx].group = g || "預設"; save(); render(); closeEditTag(); } }
    function editGroupName(e, oldName) { e.stopPropagation(); const newName = prompt(`修改群組 [${oldName}] 名稱：`, oldName); if(newName && newName !== oldName) { savedLocations.forEach(l => { if(l.group === oldName) l.group = newName; }); if(groupStates[oldName]) { groupStates[newName] = groupStates[oldName]; delete groupStates[oldName]; } save(); render(); } }
    function deleteLocation(e, index) { e.stopPropagation(); if(confirm(`移除常用地點 [${savedLocations[index].name}]？`)) { savedLocations.splice(index, 1); save(); render(); } }
    function deleteGroup(e, groupName) { e.stopPropagation(); if(confirm(`確定刪除群組 [${groupName}]？`)) { savedLocations = savedLocations.filter(l => l.group !== groupName); save(); render(); } }
    async function updateDashboard(isEdit = false) { if (isAdmin || !config.token || !config.chatId) return; const active = timers.filter(t => t.isRunning).sort((a,b) => a.endTime - b.endTime); let text = " *Mush Respawn Forecast*\n----------------\n"; if (active.length === 0) text += "目前沒有追蹤。"; else active.forEach((t, i) => { const rem = t.endTime - Date.now(); const timeStr = new Date(t.endTime).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}); text += `${i+1}. *${t.name}* : ${(rem <= 0) ? "✅ 已重生" : "⏳ " + timeStr}\n`; }); const method = (isEdit && lastMessageId) ? 'editMessageText' : 'sendMessage'; const body = { chat_id: config.chatId, text: text, parse_mode: "Markdown" }; if (isEdit && lastMessageId) body.message_id = lastMessageId; try { const res = await fetch(`https://api.telegram.org/bot${config.token}/${method}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) }); const data = await res.json(); if (data.ok && !isEdit) { lastMessageId = data.result.message_id; localStorage.setItem('tg-last-msg-id', lastMessageId); } } catch (e) {} }

    window.onload = () => { if(timers.length > 0 || config.token) manualLock(); else { document.getElementById('fake-offline-screen').classList.add('hidden'); document.getElementById('app-main').style.opacity = '1'; } render(); };
</script>
</body>
